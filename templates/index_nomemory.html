<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BettaFish 舆情分析系统</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f5f7f9; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { padding: 12px 24px; background-color: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        #status { color: #e67e22; font-weight: bold; margin-bottom: 10px; min-height: 24px; }
        #report-content { white-space: pre-wrap; line-height: 1.6; color: #333; background: #f8f9fa; padding: 20px; border-radius: 6px; border-left: 4px solid #3498db; }
        /* 简单的打字机光标效果 */
        .typing::after { content: '▌'; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐟 BettaFish 舆情分析</h1>
        <div class="input-group">
            <input type="text" id="topic-input" placeholder="输入你想分析的话题，如：小米SU7用户口碑" onkeypress="handleEnter(event)">
            <button id="search-btn" onclick="startAnalysis()">开始分析</button>
        </div>
        <div id="status"></div>
        <div id="report-content">报告将在这里生成...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script> <!-- 引入翻译官 -->
    <script>
        let eventSource = null;
        let fullMarkdown = "";

        function handleEnter(e) {
            if (e.key === 'Enter') startAnalysis();
        }

        function startAnalysis() {
            const topic = document.getElementById('topic-input').value.trim();
            if (!topic) return alert("请输入话题！");

            const btn = document.getElementById('search-btn');
            const statusDiv = document.getElementById('status');
            const contentDiv = document.getElementById('report-content');

            // 初始化界面状态
            btn.disabled = true;
            contentDiv.innerHTML = "";
            contentDiv.classList.add("typing");
            statusDiv.innerText = "🤖 Agent 团队正在搜集情报并进行论坛辩论，请稍候 (约需10-30秒)...";

            // 如果之前有连接，先关掉
            if (eventSource) eventSource.close();

            // 重置累积变量
            fullMarkdown = "";

            // 发起 SSE 请求！这是前端接收流式数据的核心 API
            eventSource = new EventSource(`/api/analyze?topic=${encodeURIComponent(topic)}`);

            // 接收到消息时的回调
            eventSource.onmessage = function(event) {
                // 当收到第一滴水（第一个字）时，表示思考结束，开始写报告了
                if (statusDiv.innerText.includes("正在搜集")) {
                    statusDiv.innerText = "✍️ 正在流式生成最终报告...";
                }
                
                // SSE 传过来的数据可能会对换行符做转义，我们需要处理一下
                const text = event.data.replace(/\\n/g, '\n');
                
                // 如果后端发来了 [DONE] 标记，说明生成结束
                if (text === "[DONE]") {
                    eventSource.close();
                    btn.disabled = false;
                    statusDiv.innerText = "✅ 报告生成完毕！";
                    contentDiv.classList.remove("typing");
                    return;
                }

                //累积源码
                fullMarkdown += text;
                // 把文字追加到页面上
                // contentDiv.innerHTML += text;
                contentDiv.innerHTML = marked.parse(fullMarkdown);
                // 自动滚动到底部 (如果有滚动条的话)
                window.scrollTo(0, document.body.scrollHeight);
            };

            // 发生错误时的回调
            eventSource.onerror = function(err) {
                console.error("SSE Error:", err);
                eventSource.close();
                btn.disabled = false;
                statusDiv.innerText = "❌ 分析过程中发生错误或连接中断。";
                contentDiv.classList.remove("typing");
            };
        }
    </script>
</body>
</html>
